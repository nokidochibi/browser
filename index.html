<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タブブラウザ＆ブックマーク</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* スクロールバーの非表示 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* iPhoneの下部ホームバー対策 */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-slate-800 overflow-hidden select-none">
    
    <div id="app" class="flex flex-col h-screen">
        <!-- 上部タブバー -->
        <div id="tab-bar" class="flex bg-slate-200 overflow-x-auto whitespace-nowrap scrollbar-hide border-b border-slate-300"></div>

        <!-- メインコンテンツ -->
        <div id="main-content" class="flex-1 overflow-hidden bg-white relative"></div>

        <!-- 下部ナビゲーション -->
        <div class="h-16 bg-white border-t border-slate-200 flex justify-around items-center px-2 pb-safe z-10">
            <button id="btn-back" class="flex flex-col items-center justify-center w-16 h-14 rounded-xl transition text-slate-600 active:scale-95">
                <i data-lucide="chevron-left" class="w-7 h-7"></i>
                <span class="text-[10px] mt-1 font-medium">戻る</span>
            </button>
            <button id="btn-tag" class="flex flex-col items-center justify-center w-16 h-14 rounded-xl transition text-slate-600 active:scale-95">
                <i data-lucide="tags" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1 font-medium">タグ登録</span>
            </button>
            <button id="btn-bookmark" class="flex flex-col items-center justify-center w-16 h-14 rounded-xl transition text-slate-600 active:scale-95">
                <i data-lucide="bookmark" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1 font-medium">ブックマーク</span>
            </button>
            <button id="btn-close-all" class="flex flex-col items-center justify-center w-16 h-14 rounded-xl transition text-slate-600 active:scale-95">
                <i data-lucide="x-square" class="w-6 h-6"></i>
                <span class="text-[10px] mt-1 font-medium">すべて閉じる</span>
            </button>
            <button id="btn-new-tab" class="flex flex-col items-center justify-center w-16 h-14 rounded-xl transition text-blue-600 active:scale-95">
                <i data-lucide="plus" class="w-7 h-7"></i>
                <span class="text-[10px] mt-1 font-medium">新規タブ</span>
            </button>
        </div>
    </div>

    <!-- モーダル（タグ登録） -->
    <div id="modal-tag" class="hidden absolute inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center"></div>

    <!-- モーダル（ブックマーク） -->
    <div id="modal-bookmark" class="hidden absolute inset-0 bg-black/50 z-50 flex flex-col justify-end"></div>

    <script>
        // === 設定 ===
        // 指定されたGASのウェブアプリURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxkhFuMVK9YFsEiD45jjbx3YCUO0_qBH5gNg_7SGvodIDOSy7cmHDX6T0ZfRykZ/exec";

        // === 状態管理 ===
        let tabs = [{ id: Date.now(), url: '', title: '新しいタブ' }];
        let activeTabId = tabs[0].id;
        let tags = [];
        let bookmarks = [];
        let selectedTagsForModal = [];
        let currentBookmarkFilterTag = '';

        // DOM要素
        const tabBarEl = document.getElementById('tab-bar');
        const mainContentEl = document.getElementById('main-content');
        const btnBack = document.getElementById('btn-back');
        const btnTag = document.getElementById('btn-tag');
        const btnBookmark = document.getElementById('btn-bookmark');
        const btnCloseAll = document.getElementById('btn-close-all');
        const btnNewTab = document.getElementById('btn-new-tab');
        const modalTag = document.getElementById('modal-tag');
        const modalBookmark = document.getElementById('modal-bookmark');

        // === 初期化 ===
        async function init() {
            renderTabs();
            renderContent();
            updateNavButtons();
            lucide.createIcons();
            await fetchGASData();
        }

        // === データ取得 ===
        async function fetchGASData() {
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                if (data.tags) tags = data.tags;
                if (data.bookmarks) bookmarks = data.bookmarks;
            } catch (e) {
                console.error("データ取得エラー:", e);
                // プレビュー用にモックデータを入れる（GAS設定前用）
                if (tags.length === 0) tags = ["音楽", "ゲーム", "勉強", "後で見る"];
            }
        }

        // === UIレンダリング ===
        function renderTabs() {
            tabBarEl.innerHTML = tabs.map(tab => `
                <div onclick="setActiveTab(${tab.id})" class="flex items-center px-4 py-3 min-w-[120px] max-w-[200px] border-r border-slate-300 cursor-pointer ${activeTabId === tab.id ? 'bg-white font-bold' : 'hover:bg-slate-100 text-slate-600'}">
                    <span class="truncate flex-1 text-sm">${tab.title}</span>
                    <button onclick="closeTab(event, ${tab.id})" class="ml-2 p-1 rounded-full hover:bg-slate-200">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderContent() {
            // タブごとのiframeまたは検索画面を構築・表示切り替え
            tabs.forEach(tab => {
                let tabEl = document.getElementById(`content-${tab.id}`);
                
                // まだDOMがなければ作る
                if (!tabEl) {
                    tabEl = document.createElement('div');
                    tabEl.id = `content-${tab.id}`;
                    tabEl.className = 'absolute inset-0 w-full h-full';
                    mainContentEl.appendChild(tabEl);
                }

                // 中身の更新（URLがあるかないか）
                if (tab.url) {
                    // 既にiframeがあれば再描画しない（リロード防止）
                    if (!tabEl.querySelector('iframe')) {
                        tabEl.innerHTML = `<iframe src="${getIframeUrl(tab.url)}" class="w-full h-full border-none" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>`;
                    }
                } else {
                    tabEl.innerHTML = getSearchScreenHtml(tab.id);
                    lucide.createIcons();
                }

                // アクティブタブの切り替え
                if (tab.id === activeTabId) {
                    tabEl.classList.remove('hidden');
                    tabEl.classList.add('block');
                } else {
                    tabEl.classList.remove('block');
                    tabEl.classList.add('hidden');
                }
            });

            // 削除されたタブのDOMを消す
            const currentTabIds = tabs.map(t => `content-${t.id}`);
            Array.from(mainContentEl.children).forEach(child => {
                if (!currentTabIds.includes(child.id)) {
                    child.remove();
                }
            });
        }

        function getSearchScreenHtml(tabId) {
            return `
                <div class="flex flex-col items-center justify-center h-full p-6 bg-slate-50">
                    <h2 class="text-2xl font-bold mb-8 text-slate-700">何を開きますか？</h2>
                    <form onsubmit="handleSearch(event, ${tabId})" class="w-full max-w-md mb-6">
                        <div class="flex items-center bg-white rounded-full shadow-md p-2 border border-slate-200">
                            <i data-lucide="search" class="text-slate-400 ml-2 w-5 h-5"></i>
                            <input type="url" id="search-input-${tabId}" placeholder="URLを入力 (例: https://youtube.com/...)" class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-lg" required />
                            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-full font-bold">開く</button>
                        </div>
                    </form>
                    <button onclick="window.open('https://www.google.com/', '_blank')" class="flex items-center gap-2 text-blue-600 hover:bg-blue-50 px-6 py-3 rounded-xl border border-blue-200 transition">
                        <i data-lucide="external-link" class="w-5 h-5"></i>
                        Google検索を開く (別ウィンドウ)
                    </button>
                </div>
            `;
        }

        function updateNavButtons() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            const currentIndex = tabs.findIndex(t => t.id === activeTabId);
            
            btnBack.disabled = currentIndex === 0;
            btnBack.style.opacity = currentIndex === 0 ? '0.3' : '1';
            
            btnTag.disabled = !activeTab || !activeTab.url;
            btnTag.style.opacity = (!activeTab || !activeTab.url) ? '0.3' : '1';
        }

        // === タブ操作アクション ===
        window.setActiveTab = function(id) {
            activeTabId = id;
            renderTabs();
            renderContent();
            updateNavButtons();
        };

        window.closeTab = function(event, id) {
            event.stopPropagation();
            if (tabs.length === 1) {
                tabs = [{ id: Date.now(), url: '', title: '新しいタブ' }];
                activeTabId = tabs[0].id;
            } else {
                tabs = tabs.filter(t => t.id !== id);
                if (activeTabId === id) {
                    activeTabId = tabs[tabs.length - 1].id;
                }
            }
            renderTabs();
            renderContent();
            updateNavButtons();
        };

        window.handleSearch = function(e, tabId) {
            e.preventDefault();
            const input = document.getElementById(`search-input-${tabId}`).value;
            if (input.startsWith('http')) {
                const tab = tabs.find(t => t.id === tabId);
                if (tab) {
                    tab.url = input;
                    tab.title = 'Webページ';
                    renderTabs();
                    renderContent();
                    updateNavButtons();
                }
            }
        };

        btnBack.addEventListener('click', () => {
            const currentIndex = tabs.findIndex(t => t.id === activeTabId);
            if (currentIndex > 0) {
                window.setActiveTab(tabs[currentIndex - 1].id);
            }
        });

        btnCloseAll.addEventListener('click', () => {
            if (confirm('すべてのタブを閉じますか？')) {
                tabs = [{ id: Date.now(), url: '', title: '新しいタブ' }];
                activeTabId = tabs[0].id;
                renderTabs();
                renderContent();
                updateNavButtons();
            }
        });

        btnNewTab.addEventListener('click', () => {
            const newTab = { id: Date.now(), url: '', title: '新しいタブ' };
            tabs.push(newTab);
            activeTabId = newTab.id;
            renderTabs();
            renderContent();
            updateNavButtons();
            setTimeout(() => { tabBarEl.scrollLeft = tabBarEl.scrollWidth; }, 50);
        });

        // === タグ登録モーダル ===
        btnTag.addEventListener('click', () => {
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (!activeTab || !activeTab.url) return;
            
            const existingBm = bookmarks.find(b => b.url === activeTab.url);
            selectedTagsForModal = existingBm && existingBm.tags ? [...existingBm.tags] : [];
            
            renderTagModalContent(activeTab.url);
            modalTag.classList.remove('hidden');
        });

        window.closeTagModal = function() {
            modalTag.classList.add('hidden');
        };

        function renderTagModalContent(url) {
            let tagsHtml = tags.map(tag => {
                const isSelected = selectedTagsForModal.includes(tag);
                return `
                    <button onclick="toggleTagForModal('${tag}')" class="px-4 py-2 rounded-full border-2 text-sm font-bold flex items-center gap-1 transition ${isSelected ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-slate-200 text-slate-600'}">
                        ${isSelected ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                        ${tag}
                    </button>
                `;
            }).join('');

            modalTag.innerHTML = `
                <div class="bg-white w-full sm:w-[500px] h-[80vh] sm:h-auto sm:max-h-[80vh] rounded-t-2xl sm:rounded-2xl p-6 flex flex-col shadow-2xl">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold flex items-center gap-2"><i data-lucide="tags" class="w-5 h-5"></i> タグを登録</h3>
                        <button onclick="closeTagModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <p class="text-xs text-slate-500 mb-4 truncate bg-slate-100 p-2 rounded">${url}</p>
                    <div class="flex-1 overflow-y-auto mb-4">
                        <div class="flex flex-wrap gap-2">${tagsHtml}</div>
                        <div class="mt-6 border-t pt-4">
                            <p class="text-sm font-bold mb-2 text-slate-600">新しいタグを作る</p>
                            <input type="text" id="new-tag-input" placeholder="タグ名を入力..." class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:border-blue-500" />
                        </div>
                    </div>
                    <button onclick="saveBookmark()" class="w-full bg-blue-600 text-white font-bold text-lg py-4 rounded-xl shadow-lg active:scale-95 transition">このタグで保存する</button>
                </div>
            `;
            lucide.createIcons();
        }

        window.toggleTagForModal = function(tag) {
            if (selectedTagsForModal.includes(tag)) {
                selectedTagsForModal = selectedTagsForModal.filter(t => t !== tag);
            } else {
                selectedTagsForModal.push(tag);
            }
            const activeTab = tabs.find(t => t.id === activeTabId);
            renderTagModalContent(activeTab.url);
        };

        window.saveBookmark = async function() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (!activeTab || !activeTab.url) return;

            const newTagInput = document.getElementById('new-tag-input').value.trim();
            if (newTagInput && !selectedTagsForModal.includes(newTagInput)) {
                selectedTagsForModal.push(newTagInput);
                if(!tags.includes(newTagInput)) tags.push(newTagInput);
            }

            // ローカルへの反映
            const existingIndex = bookmarks.findIndex(b => b.url === activeTab.url);
            if (existingIndex >= 0) {
                bookmarks[existingIndex].tags = [...selectedTagsForModal];
            } else {
                bookmarks.push({ url: activeTab.url, tags: [...selectedTagsForModal], title: "新しいブックマーク" });
            }
            
            closeTagModal();

            // GASへデータ送信 (CORS回避のため text/plain を使用)
            try {
                await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ url: activeTab.url, tags: selectedTagsForModal })
                });
            } catch (e) {
                console.error("保存エラー:", e);
                alert("保存に失敗しました");
            }
        };

        // === ブックマークモーダル ===
        btnBookmark.addEventListener('click', () => {
            currentBookmarkFilterTag = tags[0] || '';
            renderBookmarkModalContent();
            modalBookmark.classList.remove('hidden');
        });

        window.closeBookmarkModal = function() {
            modalBookmark.classList.add('hidden');
        };

        window.setBookmarkFilter = function(tag) {
            currentBookmarkFilterTag = tag;
            renderBookmarkModalContent();
        };

        function renderBookmarkModalContent() {
            const filteredBookmarks = bookmarks.filter(b => b.tags && b.tags.includes(currentBookmarkFilterTag));

            let tagsHtml = tags.map(tag => `
                <button onclick="setBookmarkFilter('${tag}')" class="whitespace-nowrap px-5 py-2 rounded-full font-bold text-sm transition ${currentBookmarkFilterTag === tag ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}">
                    ${tag}
                </button>
            `).join('');

            let bmsHtml = filteredBookmarks.length === 0 
                ? '<div class="col-span-full text-center text-slate-400 py-10">このタグのブックマークはありません</div>'
                : filteredBookmarks.map(bm => `
                    <div onclick="openUrl('${bm.url}', '${bm.title || '動画'}')" class="bg-white rounded-xl overflow-hidden shadow-sm border border-slate-200 active:scale-95 transition cursor-pointer">
                        <div class="aspect-video bg-slate-200 relative">
                            <img src="${getThumbnail(bm.url)}" alt="thumbnail" class="w-full h-full object-cover" />
                        </div>
                        <div class="p-3">
                            <p class="text-sm font-bold text-slate-800 line-clamp-2 leading-tight">${bm.title || bm.url}</p>
                        </div>
                    </div>
                `).join('');

            modalBookmark.innerHTML = `
                <div class="bg-slate-50 w-full h-[85vh] rounded-t-3xl shadow-2xl flex flex-col">
                    <div class="bg-white rounded-t-3xl border-b pt-4 pb-2 shadow-sm z-10">
                        <div class="flex justify-between items-center px-6 mb-4">
                            <h3 class="text-xl font-bold flex items-center gap-2"><i data-lucide="bookmark" class="w-5 h-5"></i> ブックマーク</h3>
                            <button onclick="closeBookmarkModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <div class="flex overflow-x-auto px-6 pb-2 gap-2 scrollbar-hide">${tagsHtml}</div>
                    </div>
                    <div class="flex-1 overflow-y-auto p-4 sm:p-6">
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">${bmsHtml}</div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.openUrl = function(url, title) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab) {
                tab.url = url;
                tab.title = title;
                renderTabs();
                renderContent();
                updateNavButtons();
            }
            closeBookmarkModal();
        };

        // === ユーティリティ ===
        function getIframeUrl(url) {
            if (!url) return '';
            if (url.includes('youtube.com/watch') || url.includes('youtu.be/')) {
                const videoId = url.split('v=')[1]?.split('&')[0] || url.split('youtu.be/')[1]?.split('?')[0];
                return `https://www.youtube.com/embed/${videoId}`;
            }
            return url;
        }

        function getThumbnail(url) {
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const videoId = url.split('v=')[1]?.split('&')[0] || url.split('youtu.be/')[1]?.split('?')[0];
                return `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            }
            return "https://placehold.co/320x180/e2e8f0/475569?text=No+Thumbnail";
        }

        // アプリ起動
        init();
    </script>
</body>
</html>
